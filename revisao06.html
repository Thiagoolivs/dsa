<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let dados = [10, 20, 30, 40, 50]
        let alvo = 30;
        let contador = 0;

        for (let i = 0; i < dados.length; i++){
            if (dados[i] === alvo){
                contador++;
            }
        }

        if (contador == 0)
            console.log("Valor " + alvo + " não encontrado")
        else
            console.log("Valor " + alvo + " encontrado")

        console.log("Contador = ", contador)
    </script>
</head>

</body>
</html>
